<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Transcript — MeetRecord</title>
  <link rel="stylesheet" href="share.css" />
</head>
<body>
  <div class="app">

    <header class="share-header">
      <div class="header-left">
        <div class="logo">
          <span class="logo-dot"></span>
          <span>MeetRecord</span>
        </div>
        <div class="header-divider"></div>
        <div class="recording-meta">
          <span class="recording-title" id="recording-title">Loading…</span>
          <span class="recording-info" id="recording-info"></span>
        </div>
      </div>
      <div class="header-right">
        <span class="platform-badge" id="platform-badge" hidden></span>
      </div>
    </header>

    <main id="transcript-container">
      <div id="loading-state" class="center-message">
        <span class="spinner"></span>
        <span>Loading transcript…</span>
      </div>

      <div id="error-state" class="center-message" hidden>
        <span class="error-icon">&#9888;</span>
        <div>
          <p id="error-text"></p>
          <p class="error-hint" id="error-hint" hidden>
            Open the MeetRecord extension and go to <strong>Settings</strong> to configure
            your Supabase URL and anon key.
          </p>
        </div>
      </div>

      <div id="transcript-body" hidden></div>
    </main>

    <footer class="share-footer">
      Shared via <strong>MeetRecord</strong>
    </footer>

  </div>
  <script src="share.js" type="module"></script>
</body>
</html>
