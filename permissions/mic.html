<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Microphone Access — MeetRecord</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0f172a;
      color: #e2e8f0;
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 40px 24px;
    }
    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 40px 32px;
      max-width: 420px;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      text-align: center;
    }
    .icon { font-size: 48px; }
    h1 { font-size: 20px; }
    p { color: #94a3b8; font-size: 14px; line-height: 1.6; }
    button {
      background: #3b82f6;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 12px 28px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
    }
    button:hover { opacity: 0.9; }
    button:disabled { opacity: 0.45; cursor: not-allowed; }
    .status { font-size: 13px; color: #94a3b8; min-height: 20px; }
    .status.ok  { color: #22c55e; }
    .status.err { color: #ef4444; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🎤</div>
    <h1>Allow microphone access</h1>
    <p>
      MeetRecord needs your microphone to record both sides of the call.
      Click the button below — Chrome will show a permission prompt in the
      address bar at the top of this tab. Click <strong>Allow</strong> there.
    </p>
    <button id="btn">Grant Microphone Access</button>
    <div class="status" id="status"></div>
  </div>

  <script>
    const btn    = document.getElementById('btn');
    const status = document.getElementById('status');

    btn.addEventListener('click', () => {
      btn.disabled = true;
      status.textContent = 'Waiting for permission…';
      status.className = 'status';

      navigator.mediaDevices.getUserMedia({ audio: true })
        .then((stream) => {
          stream.getTracks().forEach((t) => t.stop());
          status.textContent = '✓ Microphone access granted!';
          status.className = 'status ok';
          chrome.runtime.sendMessage({ type: 'MIC_PERMISSION_GRANTED' });
          setTimeout(() => window.close(), 800);
        })
        .catch((err) => {
          status.textContent = `Denied: ${err.message}`;
          status.className = 'status err';
          btn.disabled = false;
          chrome.runtime.sendMessage({ type: 'MIC_PERMISSION_DENIED', error: err.message });
        });
    });
  </script>
</body>
</html>
