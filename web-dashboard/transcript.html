<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Transcript — MeetRecord</title>
  <link rel="stylesheet" href="app.css" />
</head>
<body>
<div class="transcript-page app">

  <!-- Nav -->
  <nav class="topnav">
    <div class="topnav-left">
      <div class="logo">
        <span class="logo-dot"></span>
        MeetRecord
      </div>
      <a href="dashboard.html" class="btn btn-ghost" style="font-size:13px;">
        &#8592; All Recordings
      </a>
    </div>
    <div class="topnav-right">
      <span class="user-chip" id="user-chip"></span>
      <button class="btn btn-ghost" id="logout-btn">Sign out</button>
    </div>
  </nav>

  <div class="page-body">

    <!-- Loading -->
    <div class="center-msg" id="loading">
      <span class="spinner"></span>
      <span>Loading transcript…</span>
    </div>

    <!-- Error -->
    <div class="alert alert-error hidden" id="error-msg"></div>

    <!-- Content (hidden until loaded) -->
    <div id="content" class="hidden">

      <!-- Meta card -->
      <div class="transcript-meta">
        <div>
          <div class="meta-title" id="meta-title"></div>
          <div class="meta-row" id="meta-row"></div>
        </div>
        <button class="btn btn-primary copy-btn" id="copy-btn">
          &#128203; Copy for AI Analysis
        </button>
      </div>

      <!-- Speaker label editor -->
      <div class="speaker-editor" id="speaker-editor">
        <div class="speaker-editor-header">
          <div>
            <div class="speaker-editor-title">Speaker Labels</div>
            <div class="speaker-editor-hint">
              Rename speakers to real names or roles. Saved labels update the transcript and are used in the AI export.
            </div>
          </div>
        </div>
        <div class="speaker-inputs" id="speaker-inputs">
          <!-- One row per unique speaker — generated by JS -->
        </div>
        <div class="speaker-editor-footer">
          <button class="btn btn-primary" id="save-labels-btn">Save Labels</button>
          <span class="save-status hidden" id="save-status"></span>
        </div>
      </div>

      <!-- Transcript body -->
      <div class="transcript-box">
        <pre class="transcript-header-text" id="transcript-header-text"></pre>
        <div id="utterances"></div>
      </div>

    </div>
  </div>
</div>

<script type="module">
import { requireAuth, signOut } from './auth.js';
import { fetchTranscript, updateTranscript } from './aws.js';

// ─── Auth guard ───────────────────────────────────────────────────────────────
const session = await requireAuth();
if (!session) throw new Error('Redirecting…');

document.getElementById('user-chip').textContent = session.displayName;
document.getElementById('logout-btn').addEventListener('click', () => {
  signOut();
  location.href = 'index.html';
});

// ─── Helpers ──────────────────────────────────────────────────────────────────
function esc(str) {
  return String(str ?? '')
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function formatDate(iso) {
  if (!iso) return '—';
  return new Date(iso).toLocaleDateString('en-US',
    { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
}

function formatDuration(ms) {
  if (!ms) return '—';
  const s = Math.floor(ms / 1000), m = Math.floor(s / 60), h = Math.floor(m / 60);
  return h > 0 ? `${h}h ${m % 60}m` : `${m}m ${s % 60}s`;
}

function formatDurationHuman(ms) {
  if (!ms) return '—';
  const totalMin = Math.round(ms / 60000);
  if (totalMin < 60) return `${totalMin} minutes`;
  const h = Math.floor(totalMin / 60), m = totalMin % 60;
  return m > 0 ? `${h} hour${h > 1 ? 's' : ''} ${m} minutes` : `${h} hour${h > 1 ? 's' : ''}`;
}

function fmtMs(ms) {
  const s = Math.floor(ms / 1000), m = Math.floor(s / 60), h = Math.floor(m / 60);
  if (h > 0)
    return `${String(h).padStart(2,'0')}:${String(m%60).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
  return `${String(m).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
}

// ─── Speaker name helpers ──────────────────────────────────────────────────────

function sortedSpeakers(segments) {
  return [...new Set((segments ?? []).map(s => s.speaker))].sort();
}

function resolveSpeakerNames(rec) {
  if (rec.speakerMap && Object.keys(rec.speakerMap).length > 0) {
    return { ...rec.speakerMap };
  }
  const defaults = {};
  sortedSpeakers(rec.segments).forEach((sp, i) => {
    defaults[sp] = i === 0 ? 'Interviewer' : i === 1 ? 'Candidate' : sp;
  });
  return defaults;
}

function speakerClass(speaker, speakers) {
  const idx = speakers.indexOf(speaker);
  return idx === 0 ? 'interviewer' : idx === 1 ? 'candidate' : '';
}

// ─── Build AI-ready text ───────────────────────────────────────────────────────

function buildAIText(rec, names) {
  const label = rec.label || 'Unknown Candidate';
  const date  = rec.date
    ? new Date(rec.date).toLocaleDateString('en-US', { month:'long', day:'numeric', year:'numeric' })
    : '—';

  const header = [
    'INTERVIEW TRANSCRIPT',
    `Candidate: ${label}`,
    `Date: ${date}`,
    `Duration: ${formatDurationHuman(rec.duration)}`,
    `Recorded by: ${rec.uploadedBy || '—'}`,
  ].join('\n');

  const body = (rec.segments ?? [])
    .map(seg => `[${fmtMs(seg.start)}] ${names[seg.speaker] ?? seg.speaker}: ${seg.text}`)
    .join('\n');

  const analysis = [
    '---',
    'ANALYSIS REQUEST:',
    'Please analyze this interview transcript and provide a structured evaluation:',
    '1. CANDIDATE SCORE: Rate out of 10 with brief justification.',
    '2. KEY STRENGTHS: 3\u20135 specific strengths demonstrated.',
    '3. AREAS OF CONCERN: Red flags, gaps, or weaknesses.',
    '4. CULTURE FIT: Communication style and cultural alignment.',
    '5. HIRING RECOMMENDATION: Hire / Consider / Pass \u2014 one-paragraph rationale.',
  ].join('\n');

  return `${header}\n\nTRANSCRIPT:\n${body}\n\n${analysis}`;
}

// ─── Render functions ─────────────────────────────────────────────────────────

function renderTranscript(rec, names, speakers) {
  const label = rec.label || 'Untitled Interview';
  document.getElementById('transcript-header-text').textContent = [
    'INTERVIEW TRANSCRIPT',
    `Candidate: ${label}`,
    `Date: ${rec.date ? new Date(rec.date).toLocaleDateString('en-US', { month:'long', day:'numeric', year:'numeric' }) : '—'}`,
    `Duration: ${formatDuration(rec.duration)}`,
    `Recorded by: ${rec.uploadedBy || '—'}`,
  ].join('\n');

  const uttEl = document.getElementById('utterances');
  if (!rec.segments?.length) {
    uttEl.innerHTML = '<p style="color:var(--c-muted);font-size:13px;margin-top:12px;">No transcript segments available.</p>';
    return;
  }
  uttEl.innerHTML = rec.segments.map(seg => {
    const name = names[seg.speaker] ?? seg.speaker;
    const cls  = speakerClass(seg.speaker, speakers);
    return `
      <div class="utterance">
        <span class="utt-time">[${fmtMs(seg.start)}]</span>
        <span class="utt-speaker ${cls}">${esc(name)}</span>
        <span class="utt-text">${esc(seg.text)}</span>
      </div>`;
  }).join('');
}

function renderSpeakerEditor(names, speakers) {
  document.getElementById('speaker-inputs').innerHTML = speakers.map((sp, i) => {
    const dotClass = i === 0 ? 'dot-interviewer' : i === 1 ? 'dot-candidate' : 'dot-other';
    return `
      <div class="speaker-row">
        <span class="speaker-dot ${dotClass}"></span>
        <span class="speaker-raw">${esc(sp)}</span>
        <span class="speaker-arrow">&#8594;</span>
        <input class="field-input speaker-input"
               type="text"
               data-speaker="${esc(sp)}"
               value="${esc(names[sp] ?? sp)}"
               placeholder="Enter name or role"
               maxlength="60" />
      </div>`;
  }).join('');
}

// ─── Load recording ───────────────────────────────────────────────────────────
const recordingId = new URLSearchParams(location.search).get('id');
if (!recordingId) { location.href = 'dashboard.html'; throw new Error('No id'); }

let rec, speakerNames, speakers;

try {
  rec          = await fetchTranscript(recordingId);
  speakerNames = resolveSpeakerNames(rec);
  speakers     = sortedSpeakers(rec.segments);

  const label = rec.label || 'Untitled Interview';
  document.title = `${label} — MeetRecord`;
  document.getElementById('meta-title').textContent = label;
  document.getElementById('meta-row').innerHTML = [
    `<span><strong>Date:</strong> ${formatDate(rec.date)}</span>`,
    `<span><strong>Duration:</strong> ${formatDuration(rec.duration)}</span>`,
    `<span><strong>Recorded by:</strong> ${esc(rec.uploadedBy || '—')}</span>`,
  ].filter(Boolean).join('');

  if (speakers.length > 0) {
    renderSpeakerEditor(speakerNames, speakers);
  } else {
    document.getElementById('speaker-editor').classList.add('hidden');
  }

  renderTranscript(rec, speakerNames, speakers);

  document.getElementById('loading').classList.add('hidden');
  document.getElementById('content').classList.remove('hidden');

} catch (err) {
  document.getElementById('loading').classList.add('hidden');
  const errEl = document.getElementById('error-msg');
  errEl.textContent = `Failed to load transcript: ${err.message}`;
  errEl.classList.remove('hidden');
  console.error('[transcript]', err);
}

// ─── Save labels ──────────────────────────────────────────────────────────────

document.getElementById('save-labels-btn').addEventListener('click', async () => {
  const saveBtn  = document.getElementById('save-labels-btn');
  const statusEl = document.getElementById('save-status');

  const newNames = {};
  document.querySelectorAll('.speaker-input').forEach(input => {
    newNames[input.dataset.speaker] = input.value.trim() || input.dataset.speaker;
  });

  saveBtn.disabled = true;
  saveBtn.textContent = 'Saving…';
  statusEl.className = 'save-status hidden';

  try {
    await updateTranscript(recordingId, { speakerMap: newNames });
    rec.speakerMap = newNames;
    speakerNames   = newNames;
    renderTranscript(rec, speakerNames, speakers);
    statusEl.textContent = 'Labels saved \u2713';
    statusEl.className   = 'save-status save-ok';
    setTimeout(() => { statusEl.className = 'save-status hidden'; }, 2000);
  } catch (err) {
    console.error('[transcript] save failed:', err);
    statusEl.textContent = `Save failed: ${err.message}`;
    statusEl.className   = 'save-status save-err';
  } finally {
    saveBtn.disabled = false;
    saveBtn.textContent = 'Save Labels';
  }
});

// ─── Copy for AI Analysis ─────────────────────────────────────────────────────

document.getElementById('copy-btn').addEventListener('click', async (e) => {
  const text = buildAIText(rec, speakerNames);
  try {
    await navigator.clipboard.writeText(text);
    const btn = e.currentTarget, orig = btn.innerHTML;
    btn.textContent = 'Copied! Paste into Claude or ChatGPT';
    setTimeout(() => { btn.innerHTML = orig; }, 3000);
  } catch {
    prompt('Copy this text:', text);
  }
});
</script>
</body>
</html>
