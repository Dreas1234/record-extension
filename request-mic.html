<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Microphone Access — MeetRecord</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0f172a;
      color: #e2e8f0;
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 40px 24px;
    }
    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 40px 32px;
      max-width: 420px;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      text-align: center;
    }
    .icon  { font-size: 48px; }
    h1     { font-size: 20px; }
    p      { color: #94a3b8; font-size: 14px; line-height: 1.6; }
    .status          { font-size: 13px; min-height: 20px; color: #94a3b8; }
    .status.ok       { color: #22c55e; }
    .status.err      { color: #ef4444; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🎤</div>
    <h1>Allow microphone access</h1>
    <p>
      MeetRecord needs your microphone to record both sides of the call.
      Chrome will prompt you — click <strong>Allow</strong>.
    </p>
    <div class="status" id="status">Requesting access…</div>
  </div>
  <script src="request-mic.js"></script>
</body>
</html>
