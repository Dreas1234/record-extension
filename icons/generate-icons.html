<!DOCTYPE html>
<!--
  Open this file in Chrome to generate PNG icons from the SVG.
  Right-click each canvas and "Save image as" → icon16.png, icon32.png, etc.
  Or run: node generate-icons.js (requires canvas npm package)
-->
<html>
<body style="background:#111;display:flex;gap:16px;padding:20px;flex-wrap:wrap;">
<script>
const sizes = [16, 32, 48, 128];
const svgUrl = 'icon.svg';

sizes.forEach(size => {
  const canvas = document.createElement('canvas');
  canvas.width = canvas.height = size;
  canvas.title = `icon${size}.png`;
  canvas.style.cssText = `width:${size}px;height:${size}px;border:1px solid #333;cursor:pointer`;
  canvas.title = `icon${size}.png — right-click to save`;
  document.body.appendChild(canvas);

  const img = new Image();
  img.onload = () => {
    canvas.getContext('2d').drawImage(img, 0, 0, size, size);
  };
  img.src = svgUrl;

  const label = document.createElement('p');
  label.textContent = `${size}px`;
  label.style.cssText = 'color:#fff;font-family:sans-serif;font-size:11px;text-align:center;margin:0';
  document.body.appendChild(label);
});
</script>
</body>
</html>
