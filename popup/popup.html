<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>MeetRecord</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="app">

    <header class="header">
      <div class="logo">
        <span class="logo-dot"></span>
        <span class="logo-text">MeetRecord</span>
      </div>
      <div class="header-right">
        <div class="user-info hidden" id="user-info">
          <span class="user-name" id="user-name"></span>
          <button class="btn-link" id="btn-logout">Sign out</button>
        </div>
        <button class="btn-icon-header" id="btn-settings" title="Settings">&#9881;</button>
      </div>
    </header>

    <div class="settings-panel" id="settings-panel">
      <label class="settings-label" for="input-api-key">AssemblyAI API Key</label>
      <div class="settings-row">
        <input type="password" id="input-api-key" class="settings-input" placeholder="Paste your API key…" autocomplete="off" spellcheck="false" />
      </div>

      <label class="settings-label" for="input-s3-bucket">S3 Bucket Name</label>
      <div class="settings-row">
        <input type="text" id="input-s3-bucket" class="settings-input" placeholder="my-meetrecord-bucket" autocomplete="off" spellcheck="false" />
      </div>

      <label class="settings-label" for="input-aws-region">AWS Region</label>
      <div class="settings-row">
        <input type="text" id="input-aws-region" class="settings-input" placeholder="us-east-1" autocomplete="off" spellcheck="false" />
      </div>

      <label class="settings-label" for="input-user-pool-id">Cognito User Pool ID</label>
      <div class="settings-row">
        <input type="text" id="input-user-pool-id" class="settings-input" placeholder="us-east-1_XXXXXXXXX" autocomplete="off" spellcheck="false" />
      </div>

      <label class="settings-label" for="input-identity-pool-id">Cognito Identity Pool ID</label>
      <div class="settings-row">
        <input type="text" id="input-identity-pool-id" class="settings-input" placeholder="us-east-1:xxxxxxxx-xxxx-…" autocomplete="off" spellcheck="false" />
      </div>

      <label class="settings-label" for="input-client-id">Cognito App Client ID</label>
      <div class="settings-row">
        <input type="text" id="input-client-id" class="settings-input" placeholder="xxxxxxxxxxxxxxxxxxxxxxxxxx" autocomplete="off" spellcheck="false" />
      </div>

      <div class="settings-row">
        <button class="btn btn-primary btn-save" id="btn-save-settings">Save</button>
      </div>
      <p class="settings-hint" id="settings-hint"></p>
    </div>

    <!-- Login view — shown when not authenticated -->
    <div class="login-view" id="login-view">
      <p class="login-hint">Sign in to start recording</p>
      <input type="email" id="input-email" class="settings-input"
             placeholder="Work email" autocomplete="email" />
      <input type="password" id="input-password" class="settings-input"
             placeholder="Password" autocomplete="current-password" />
      <button class="btn btn-primary" id="btn-sign-in">Sign in</button>
      <p class="login-error" id="login-error"></p>
    </div>

    <!-- Main — shown when authenticated -->
    <main class="hidden">

      <div class="status-card">
        <div class="status-indicator">
          <span class="status-dot" id="status-dot"></span>
          <span class="status-text" id="status-text">Not Recording</span>
        </div>
        <div class="timer" id="timer" hidden>00:00:00</div>
      </div>

      <div class="controls">
        <button class="btn btn-primary" id="btn-record">
          <span class="btn-icon">&#9654;</span>
          <span id="btn-record-label">Start Recording</span>
        </button>
      </div>

      <section class="recordings-section">
        <div class="section-header">
          <h3 class="section-title">Recordings</h3>
          <button class="btn-link" id="btn-dashboard">View all →</button>
        </div>
        <div id="recordings-list" class="recordings-list">
          <p class="empty-state">No recordings yet.</p>
        </div>
      </section>

    </main>
  </div>
  <script src="popup.js" type="module"></script>
</body>
</html>
