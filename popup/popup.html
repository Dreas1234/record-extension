<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>MeetRecord</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="app">

    <header class="header">
      <div class="logo">
        <span class="logo-dot"></span>
        <span class="logo-text">MeetRecord</span>
      </div>
    </header>

    <main>

      <div class="status-card">
        <div class="status-indicator">
          <span class="status-dot" id="status-dot"></span>
          <span class="status-text" id="status-text">Not Recording</span>
        </div>
        <div class="timer" id="timer" hidden>00:00:00</div>
      </div>

      <div class="controls">
        <button class="btn btn-primary" id="btn-record">
          <span class="btn-icon">&#9654;</span>
          <span id="btn-record-label">Start Recording</span>
        </button>
      </div>

      <section class="recordings-section">
        <h3 class="section-title">Recordings</h3>
        <div id="recordings-list" class="recordings-list">
          <p class="empty-state">No recordings yet.</p>
        </div>
      </section>

    </main>
  </div>
  <script src="popup.js" type="module"></script>
</body>
</html>
