<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>MeetRecord</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="app">

    <header class="header">
      <div class="logo">
        <span class="logo-dot"></span>
        <span class="logo-text">MeetRecord</span>
      </div>
      <div class="header-right">
        <div class="user-info hidden" id="user-info">
          <span class="user-name" id="user-name"></span>
          <button class="btn-link" id="btn-logout">Sign out</button>
        </div>
        <button class="btn-icon-header" id="btn-settings" title="Settings">&#9881;</button>
      </div>
    </header>

    <div class="settings-panel" id="settings-panel">
      <label class="settings-label" for="input-api-url">Backend API URL</label>
      <div class="settings-row">
        <input type="url" id="input-api-url" class="settings-input" placeholder="https://api.yourcompany.com" autocomplete="off" spellcheck="false" />
      </div>

      <label class="settings-label" for="input-api-key">AssemblyAI API Key</label>
      <div class="settings-row">
        <input type="password" id="input-api-key" class="settings-input" placeholder="Paste your API key…" autocomplete="off" spellcheck="false" />
      </div>

      <div class="settings-row">
        <button class="btn btn-primary btn-save" id="btn-save-settings">Save</button>
      </div>
      <p class="settings-hint" id="settings-hint"></p>
    </div>

    <!-- Setup required — shown when backend API not configured -->
    <div class="setup-required hidden" id="setup-required">
      <p class="login-hint">Setup required</p>
      <p class="setup-detail">Complete the onboarding wizard to configure MeetRecord before signing in.</p>
      <button class="btn btn-primary" id="btn-open-onboarding">Open Setup Wizard</button>
    </div>

    <!-- Login view — shown when not authenticated -->
    <div class="login-view hidden" id="login-view">
      <p class="login-hint">Sign in to start recording</p>
      <input type="email" id="input-email" class="settings-input"
             placeholder="Work email" autocomplete="email" />
      <input type="password" id="input-password" class="settings-input"
             placeholder="Password" autocomplete="current-password" />
      <button class="btn btn-primary" id="btn-sign-in">Sign in</button>
      <p class="login-error" id="login-error"></p>
    </div>

    <!-- Main — shown when authenticated -->
    <main class="hidden">

      <div class="status-card">
        <div class="status-indicator">
          <span class="status-dot" id="status-dot"></span>
          <span class="status-text" id="status-text">Not Recording</span>
        </div>
        <div class="timer" id="timer" hidden>00:00:00</div>
      </div>

      <div class="mic-selector">
        <label class="settings-label" for="mic-select">Microphone</label>
        <div class="mic-selector-row">
          <select id="mic-select" class="mic-dropdown">
            <option value="">Default</option>
          </select>
          <button class="btn-icon-sm" id="btn-refresh-mics" title="Refresh devices">&#8635;</button>
        </div>
      </div>

      <div class="controls">
        <button class="btn btn-primary" id="btn-record">
          <span class="btn-icon">&#9654;</span>
          <span id="btn-record-label">Start Recording</span>
        </button>
      </div>

      <div class="silence-warning hidden" id="silence-warning">
        <span class="silence-warning-text">&#9888; No audio detected from your microphone. Is the right input selected?</span>
        <button class="btn-link silence-dismiss" id="btn-dismiss-silence">Dismiss</button>
      </div>

      <section class="recordings-section">
        <div class="section-header">
          <h3 class="section-title">Recordings</h3>
          <button class="btn-link" id="btn-dashboard">View all →</button>
        </div>
        <div id="recordings-list" class="recordings-list">
          <p class="empty-state">No recordings yet.</p>
        </div>
      </section>

    </main>
  </div>
  <script src="popup.js" type="module"></script>
</body>
</html>
